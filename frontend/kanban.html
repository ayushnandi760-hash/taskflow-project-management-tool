<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kanban board for TaskFlow — drag and drop tasks between columns.">
    <title>Kanban Board | TaskFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/phase6.css">
</head>
<body class="kanban-page">

    <!-- Animated Background -->
    <div class="bg-animated"></div>
    <div class="particles" id="particles"></div>

    <!-- ===== Navigation Bar ===== -->
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="navbar-logo">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <line x1="8" y1="3" x2="8" y2="21"/>
                    <line x1="16" y1="3" x2="16" y2="21"/>
                    <line x1="3" y1="9" x2="8" y2="9"/>
                    <line x1="16" y1="14" x2="21" y2="14"/>
                </svg>
            </div>
            <h2>TaskFlow</h2>
        </div>

        <div class="navbar-center">
            <nav class="nav-links">
                <a href="projects.html" class="nav-link" id="navProjects">
                    <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    Projects
                </a>
                <a href="profile.html" class="nav-link" id="navProfile">
                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Profile
                </a>
            </nav>
        </div>

        <div class="navbar-actions">
            <div class="navbar-user" id="navbarUser">
                <div class="user-avatar-sm" id="navAvatar">U</div>
                <span class="user-name-sm" id="navUserName">Loading...</span>
            </div>
            <button class="btn-logout" id="logoutBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Logout
            </button>
        </div>
    </nav>

    <!-- ===== Main Board Area ===== -->
    <main class="kanban-main">

        <!-- Toast notification -->
        <div class="toast" id="toast">
            <span class="toast-icon" id="toastIcon"></span>
            <span class="toast-message" id="toastMessage"></span>
        </div>

        <!-- Board Header -->
        <div class="board-header">
            <div class="board-header-left">
                <!-- Back link — JS fills the href with the project ID -->
                <a href="project-detail.html" class="board-back-btn" id="backToProject">
                    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                    Back to Project
                </a>
                <div class="board-title-wrap">
                    <h1 id="boardProjectName">Loading…</h1>
                    <p id="boardSubtitle">Kanban Board · drag cards to update status</p>
                </div>
            </div>
            <div class="board-header-right">
                <button class="btn-refresh-board" id="refreshBoardBtn">
                    <svg viewBox="0 0 24 24">
                        <polyline points="23 4 23 10 17 10"/>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                    Refresh
                </button>
            </div>
        </div>

        <!-- ===== Kanban Board Grid ===== -->
        <div class="kanban-board" id="kanbanBoard">

            <!-- ── Column 1: To Do ── -->
            <div
                class="kanban-col col-todo"
                id="col-To Do"
                data-status="To Do"
            >
                <div class="col-header">
                    <div class="col-title">
                        <span class="col-dot"></span>
                        <h2>To Do</h2>
                    </div>
                    <span class="col-count" id="count-To Do">0</span>
                </div>
                <!-- Cards drop zone -->
                <div class="col-cards" id="cards-To Do">
                    <!-- Skeleton loaders shown while loading -->
                    <div class="k-skeleton"></div>
                    <div class="k-skeleton" style="height:70px;opacity:.6;"></div>
                </div>
            </div>

            <!-- ── Column 2: In Progress ── -->
            <div
                class="kanban-col col-inprogress"
                id="col-In Progress"
                data-status="In Progress"
            >
                <div class="col-header">
                    <div class="col-title">
                        <span class="col-dot"></span>
                        <h2>In Progress</h2>
                    </div>
                    <span class="col-count" id="count-In Progress">0</span>
                </div>
                <div class="col-cards" id="cards-In Progress">
                    <div class="k-skeleton"></div>
                </div>
            </div>

            <!-- ── Column 3: Completed ── -->
            <div
                class="kanban-col col-completed"
                id="col-Completed"
                data-status="Completed"
            >
                <div class="col-header">
                    <div class="col-title">
                        <span class="col-dot"></span>
                        <h2>Completed</h2>
                    </div>
                    <span class="col-count" id="count-Completed">0</span>
                </div>
                <div class="col-cards" id="cards-Completed">
                    <div class="k-skeleton" style="height:70px;opacity:.5;"></div>
                </div>
            </div>

        </div>
        <!-- /kanban-board -->

    </main>

    <!-- ===== Comments Modal (Phase 6) ===== -->
    <div class="modal-overlay" id="commentsModal">
        <div class="modal" id="commentsModalBox">
            <div class="modal-header">
                <h2 class="modal-title" id="commentsTaskTitle">Task Comments</h2>
                <button class="modal-close" id="closeCommentsModal" aria-label="Close modal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <div class="comments-container">
                <div class="comments-list" id="commentsList">
                    <!-- Comments loaded by JS -->
                    <div class="comments-empty">Loading comments...</div>
                </div>

                <form class="comment-input-area" id="commentForm">
                    <input type="hidden" id="commentTaskId">
                    <textarea id="commentText" placeholder="Write a comment..." required maxlength="2000"></textarea>
                    <button type="submit" class="btn-send-comment" id="sendCommentBtn">Send</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/kanban.js"></script>
    <script src="js/phase6.js"></script>
</body>
</html>
