<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your TaskFlow profile. View and manage your account details.">
    <title>Profile | TaskFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/projects.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animated"></div>
    <div class="particles" id="particles"></div>

    <div class="profile-container">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="navbar-brand">
                <div class="navbar-logo">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <line x1="8" y1="3" x2="8" y2="21"/>
                        <line x1="16" y1="3" x2="16" y2="21"/>
                        <line x1="3" y1="9" x2="8" y2="9"/>
                        <line x1="16" y1="14" x2="21" y2="14"/>
                    </svg>
                </div>
                <h2>TaskFlow</h2>
            </div>
            <div class="navbar-center">
                <nav class="nav-links">
                    <a href="projects.html" class="nav-link" id="navProjects">
                        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                        Projects
                    </a>
                    <a href="profile.html" class="nav-link active" id="navProfile">
                        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Profile
                    </a>
                </nav>
            </div>
            <div class="navbar-actions">
                <button class="btn-logout" id="logoutBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Logout
                </button>
            </div>
        </nav>

        <!-- Profile Content -->
        <div class="profile-content">
            <div class="profile-card">
                <!-- Loading Skeleton (shown while data loads) -->
                <div id="profileSkeleton">
                    <div class="skeleton skeleton-avatar"></div>
                    <div class="skeleton skeleton-text" style="width: 60%; margin: 0 auto 0.5rem;"></div>
                    <div class="skeleton skeleton-text" style="width: 30%; margin: 0 auto 2rem;"></div>
                    <div class="skeleton skeleton-text" style="height: 60px; margin-bottom: 1rem;"></div>
                    <div class="skeleton skeleton-text" style="height: 60px; margin-bottom: 1rem;"></div>
                    <div class="skeleton skeleton-text" style="height: 60px;"></div>
                </div>

                <!-- Actual Profile Data (hidden until loaded) -->
                <div id="profileData" style="display: none;">
                    <!-- Avatar with Initial -->
                    <div class="profile-avatar" id="profileAvatar">A</div>

                    <!-- Name & Role -->
                    <h2 class="profile-name" id="profileName">Loading...</h2>
                    <div class="profile-role">
                        <span class="role-badge" id="profileRole">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                            </svg>
                            user
                        </span>
                    </div>

                    <!-- Profile Info Items -->
                    <div class="profile-info">
                        <!-- Email -->
                        <div class="info-item">
                            <div class="info-icon">
                                <svg viewBox="0 0 24 24">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                    <polyline points="22,6 12,13 2,6"/>
                                </svg>
                            </div>
                            <div class="info-text">
                                <span class="info-label">Email</span>
                                <span class="info-value" id="profileEmail">loading...</span>
                            </div>
                        </div>

                        <!-- User ID -->
                        <div class="info-item">
                            <div class="info-icon">
                                <svg viewBox="0 0 24 24">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                            </div>
                            <div class="info-text">
                                <span class="info-label">User ID</span>
                                <span class="info-value" id="profileId">loading...</span>
                            </div>
                        </div>

                        <!-- Member Since -->
                        <div class="info-item">
                            <div class="info-icon">
                                <svg viewBox="0 0 24 24">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                    <line x1="16" y1="2" x2="16" y2="6"/>
                                    <line x1="8" y1="2" x2="8" y2="6"/>
                                    <line x1="3" y1="10" x2="21" y2="10"/>
                                </svg>
                            </div>
                            <div class="info-text">
                                <span class="info-label">Member Since</span>
                                <span class="info-value" id="profileDate">loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/profile.js"></script>
</body>
</html>
